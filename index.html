<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Autoresbot API | Dashboard & API Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e27;
            color: #e0e4f0;
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Sidebar Layout */
        .app-wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0f1235 0%, #0a0e27 100%);
            border-right: 1px solid rgba(255,255,255,0.08);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            padding: 1.5rem 0;
        }

        .sidebar-header {
            padding: 0 1.5rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 1.5rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo span {
            font-size: 0.75rem;
            color: #6366f1;
            background: none;
            -webkit-background-clip: unset;
        }

        .nav-section {
            padding: 0 1rem;
            margin-bottom: 2rem;
        }

        .nav-section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #5b6e8c;
            padding: 0 1rem;
            margin-bottom: 0.8rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            color: #8b9ab0;
            text-decoration: none;
            margin-bottom: 4px;
            transition: 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
        }

        .nav-item i {
            width: 22px;
        }

        .upgrade-btn {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            margin: 1rem;
            text-align: center;
            border-radius: 40px;
            padding: 0.75rem;
            color: white;
            font-weight: 600;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 1.5rem;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255,255,255,0.05);
            padding: 0.5rem 1rem;
            border-radius: 40px;
        }

        /* Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(15, 18, 53, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .stat-label {
            font-size: 0.8rem;
            color: #8b9ab0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-top: 0.5rem;
        }

        /* Form Elements */
        .api-check {
            background: rgba(15, 18, 53, 0.6);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .api-check input {
            background: #0a0e27;
            border: 1px solid #1f2348;
            padding: 12px 20px;
            border-radius: 40px;
            width: 70%;
            color: white;
            font-family: monospace;
        }

        .api-check button {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-left: 10px;
        }

        /* Table */
        .feature-table {
            width: 100%;
            border-collapse: collapse;
        }

        .feature-table th, .feature-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .feature-table th {
            color: #8b9ab0;
            font-weight: 600;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-success { background: #10b98120; color: #10b981; }
        .badge-warning { background: #f59e0b20; color: #f59e0b; }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #0f1235;
            border-radius: 28px;
            padding: 2rem;
            max-width: 450px;
            width: 90%;
            border: 1px solid #1f2348;
        }

        .hidden { display: none; }

        .btn {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-primary { background: #6366f1; color: white; }
        .btn-danger { background: #ef4444; color: white; }

        input, select {
            background: #0a0e27;
            border: 1px solid #1f2348;
            padding: 12px 16px;
            border-radius: 28px;
            width: 100%;
            color: white;
        }

        @media (max-width: 768px) {
            .sidebar { width: 0; display: none; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>
<div class="app-wrapper" id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">Autoresbot <span>API</span></div>
        </div>
        
        <div class="nav-section">

            <a href="#" class="nav-item" data-page="convert"><i class="fas fa-exchange-alt"></i> Convert</a>
            <a href="#" class="nav-item" data-page="database"><i class="fas fa-database"></i> Database</a>

        <div class="nav-section">

            <a href="#" class="nav-item" data-page="text-manipulation"><i class="fas fa-i-cursor"></i> Text Manipulation</a>

        </div>

        <div class="upgrade-btn" id="upgradeBtn">⬆ Upgrade Premium</div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="top-bar">
            <h1 class="page-title" id="pageTitle">Dashboard</h1>
            <div class="user-info" id="userInfo">
                <i class="fas fa-user-circle"></i>
                <span id="userName">Guest</span>
                <button class="btn btn-primary" id="logoutBtn" style="display:none; padding:5px 12px; font-size:0.8rem">Logout</button>
            </div>
        </div>
        <div id="pageContent"></div>
    </main>
</div>

<script>
    // ==================== SECURITY STORAGE ====================
    let users = JSON.parse(localStorage.getItem('autoresbot_users')) || [];
    let currentUser = JSON.parse(localStorage.getItem('autoresbot_current')) || null;
    let apiKeys = JSON.parse(localStorage.getItem('autoresbot_apikeys')) || [];
    let requests = JSON.parse(localStorage.getItem('autoresbot_requests')) || { total: 45364736, today: 33476 };

    function persist() {
        localStorage.setItem('autoresbot_users', JSON.stringify(users));
        localStorage.setItem('autoresbot_current', JSON.stringify(currentUser));
        localStorage.setItem('autoresbot_apikeys', JSON.stringify(apiKeys));
        localStorage.setItem('autoresbot_requests', JSON.stringify(requests));
    }

    // Helper
    function getClientIP() {
        return "103.155.201.10";
    }

    function generateApiKey() {
        return 'AR_' + Math.random().toString(36).substring(2, 15).toUpperCase() + '_' + Date.now().toString(36).toUpperCase();
    }

    // ==================== AUTH KETAT ====================
    function register(username, password, email) {
        if (username.length < 4) return { success: false, msg: "Username minimal 4 karakter" };
        if (password.length < 8) return { success: false, msg: "Password minimal 8 karakter" };
        if (users.find(u => u.username === username)) return { success: false, msg: "Username sudah terdaftar" };
        
        // Generate API key otomatis untuk user baru
        let newApiKey = generateApiKey();
        
        users.push({
            username: username,
            password: btoa(password),
            email: email,
            apiKey: newApiKey,
            limit: 5000,
            expiration: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString(),
            role: 'user',
            createdAt: new Date().toISOString()
        });
        
        apiKeys.push({
            key: newApiKey,
            owner: username,
            limit: 5000,
            expired: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString(),
            createdAt: new Date().toISOString()
        });
        
        persist();
        return { success: true, apiKey: newApiKey };
    }

    function login(username, password) {
        let user = users.find(u => u.username === username && u.password === btoa(password));
        if (!user) return { success: false, msg: "Username atau password salah" };
        currentUser = user;
        persist();
        return { success: true };
    }

    function logout() {
        currentUser = null;
        persist();
        render();
    }

    function checkApiKey(key) {
        let apiKey = apiKeys.find(k => k.key === key);
        if (!apiKey) return { valid: false, msg: "API Key tidak valid" };
        let expired = new Date(apiKey.expired) < new Date();
        if (expired) return { valid: false, msg: "API Key sudah kadaluarsa" };
        return { valid: true, data: apiKey };
    }

    // ==================== RENDER ENGINE ====================
    let currentPage = "dashboard";

    function render() {
        if (!currentUser) {
            document.getElementById('pageContent').innerHTML = renderAuth();
            document.getElementById('pageTitle').innerText = "Login";
            document.getElementById('userName').innerText = "Guest";
            document.getElementById('logoutBtn').style.display = "none";
            attachAuthEvents();
            return;
        }

        document.getElementById('userName').innerText = currentUser.username;
        document.getElementById('logoutBtn').style.display = "inline-block";
        
        let html = '';
        if (currentPage === 'dashboard') html = renderDashboard();
        else if (currentPage === 'pricing') html = renderPricing();
        else if (currentPage === 'documentation') html = renderDocumentation();
        else html = renderCategoryPage(currentPage);
        
        document.getElementById('pageContent').innerHTML = html;
        document.getElementById('pageTitle').innerText = getPageTitle();
        attachEvents();
    }

    function getPageTitle() {
        const titles = {
            dashboard: 'Dashboard',
            pricing: 'Pricing',
            documentation: 'Documentation',
            ai: 'Artificial Intelligence API',
            anime: 'Anime API',
            convert: 'Convert API',
            database: 'Database API',
            downloader: 'Downloader API',
            games: 'Games API',
            islami: 'Islami API',
            maker: 'Maker API',
            news: 'News API',
            information: 'Information API',
            primbon: 'Primbon API',
            random: 'Random API',
            search: 'Search API',
            stalker: 'Stalker API',
            tools: 'Tools API',
            'text-manipulation': 'Text Manipulation API',
            textpro: 'Textpro API',
            'text-to-voice': 'Text To Voice API'
        };
        return titles[currentPage] || 'API Documentation';
    }

    function renderAuth() {
        return `
        <div class="stat-card" style="max-width:450px; margin:2rem auto">
            <div style="text-align:center; margin-bottom:1.5rem">
                <h2>Autoresbot API</h2>
                <p>Login atau Register untuk mengakses API</p>
            </div>
            <div style="display:flex; gap:10px; margin-bottom:1.5rem">
                <button class="btn btn-primary" id="showLoginBtn" style="flex:1">Login</button>
                <button class="btn" id="showRegBtn" style="flex:1; background:#1f2348">Register</button>
            </div>
            
            <div id="loginBox">
                <input type="text" id="loginUser" placeholder="Username" style="margin-bottom:10px">
                <input type="password" id="loginPass" placeholder="Password" style="margin-bottom:10px">
                <button class="btn btn-primary" id="doLoginBtn" style="width:100%">Login</button>
            </div>
            
            <div id="regBox" class="hidden">
                <input type="text" id="regUser" placeholder="Username (min 4)" style="margin-bottom:10px">
                <input type="email" id="regEmail" placeholder="Email" style="margin-bottom:10px">
                <input type="password" id="regPass" placeholder="Password (min 8)" style="margin-bottom:10px">
                <button class="btn btn-primary" id="doRegBtn" style="width:100%">Register</button>
            </div>
        </div>
        `;
    }

    function renderDashboard() {
        let userApiKey = apiKeys.find(k => k.owner === currentUser.username);
        let expiresIn = userApiKey ? new Date(userApiKey.expired) : new Date();
        
        return `
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">YOUR IP ADDRESS</div>
                <div class="stat-value">${getClientIP()}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">TOTAL USERS</div>
                <div class="stat-value">${users.length}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">REQUEST TODAY</div>
                <div class="stat-value">${requests.today.toLocaleString()}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">TOTAL REQUEST</div>
                <div class="stat-value">${requests.total.toLocaleString()}</div>
            </div>
        </div>
        
        <div class="api-check">
            <h3>Check API Key</h3>
            <div style="display:flex; gap:10px; flex-wrap:wrap">
                <input type="text" id="checkApiKey" placeholder="Enter your API key...">
                <button id="checkApiBtn">Check</button>
            </div>
            <div id="checkResult" style="margin-top:1rem"></div>
        </div>
        
        <div class="stat-card">
            <h3>Welcome to Autoresbot API</h3>
            <p>Thank you for using the services of Autoresbot API!! Please use an API key that is hard to guess, just like a strong password.</p>
            <div style="margin-top:1rem">
                <p><strong>API Key:</strong> <code>${userApiKey?.key || 'Belum ada'}</code></p>
                <p><strong>Limit:</strong> ${userApiKey?.limit?.toLocaleString() || 0} requests</p>
                <p><strong>Expiration:</strong> ${userApiKey ? new Date(userApiKey.expired).toLocaleDateString() : '-'}</p>
            </div>
        </div>
        
        <div class="stat-card">
            <h3>Feature Updates</h3>
            <table class="feature-table">
                <thead>
                    <tr><th>FEATURE</th><th>DATE</th><th>NOTES</th><th>PREVIEW</th></tr>
                </thead>
                <tbody>
                    <tr><td>Add Features</td><td>2026-05-25 17:16:36</td><td>Sticker Circle</td><td><a href="#" style="color:#6366f1">View</a></td></tr>
                    <tr><td>Tebakan</td><td>2026-05-25 17:14:59</td><td>fix tebak hewan, bendera, pemain bola</td><td><a href="#" style="color:#6366f1">View</a></td></tr>
                    <tr><td>Anime</td><td>2026-05-03 14:20:54</td><td>Fix</td><td><a href="#" style="color:#6366f1">View</a></td></tr>
                </tbody>
            </table>
        </div>
        `;
    }

    function renderPricing() {
        return `
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Free Tier</h3>
                <p class="stat-value">Rp 0</p>
                <p>5000 requests/bulan</p>
                <p>Basic endpoints</p>
                <button class="btn btn-primary" style="margin-top:1rem">Current Plan</button>
            </div>
            <div class="stat-card">
                <h3>Pro Tier</h3>
                <p class="stat-value">Rp 99.000</p>
                <p>Unlimited requests</p>
                <p>All endpoints + Priority support</p>
                <button class="btn btn-primary" style="margin-top:1rem">Upgrade</button>
            </div>
            <div class="stat-card">
                <h3>Enterprise</h3>
                <p class="stat-value">Custom</p>
                <p>Dedicated server</p>
                <p>SLA 99.9%</p>
                <button class="btn btn-primary" style="margin-top:1rem">Contact Us</button>
            </div>
        </div>
        `;
    }

    function renderDocumentation() {
        return `
        <div class="stat-card">
            <h3>API Documentation</h3>
            <p>Base URL: <code>https://api.autoresbot.com/v1</code></p>
            <p>Authentication: <code>X-API-Key: YOUR_API_KEY</code></p>
            <hr style="margin:1rem 0">
            <h4>Example Request</h4>
            <pre style="background:#0a0e27; padding:1rem; border-radius:16px; overflow-x:auto">
curl -X GET "https://api.autoresbot.com/v1/ai/chat?message=halo" \\
  -H "X-API-Key: AR_XXXXX"
            </pre>
            <hr style="margin:1rem 0">
            <h4>Available Endpoints</h4>
            <table class="feature-table">
                <tr><th>Endpoint</th><th>Method</th><th>Description</th></tr>
                <tr><td>/ai/chat</td><td>GET/POST</td><td>AI Chatbot</td></tr>
                <tr><td>/downloader/ytmp3</td><td>GET</td><td>Download YouTube Audio</td></tr>
                <tr><td>/anime/random</td><td>GET</td><td>Random Anime</td></tr>
                <tr><td>/islami/jadwal-sholat</td><td>GET</td><td>Jadwal Sholat</td></tr>
                <tr><td>/tools/shorturl</td><td>POST</td><td>Short URL</td></tr>
            </table>
        </div>
        `;
    }

    function renderCategoryPage(category) {
        const endpoints = {
            ai: [{ name: "ChatGPT", endpoint: "/ai/chat" }, { name: "Gemini AI", endpoint: "/ai/gemini" }, { name: "Image Generation", endpoint: "/ai/image" }],
            downloader: [{ name: "YouTube MP3", endpoint: "/downloader/ytmp3" }, { name: "YouTube MP4", endpoint: "/downloader/ytmp4" }, { name: "TikTok", endpoint: "/downloader/tiktok" }, { name: "Instagram", endpoint: "/downloader/ig" }],
            islami: [{ name: "Jadwal Sholat", endpoint: "/islami/jadwal" }, { name: "Al-Quran", endpoint: "/islami/quran" }, { name: "Doa Harian", endpoint: "/islami/doa" }, { name: "Asmaul Husna", endpoint: "/islami/asmaul" }],
            maker: [{ name: "Sticker Maker", endpoint: "/maker/sticker" }, { name: "Circle Sticker", endpoint: "/maker/circle" }, { name: "Text to Image", endpoint: "/maker/text2img" }],
            stalker: [{ name: "Instagram Stalk", endpoint: "/stalker/ig" }, { name: "TikTok Stalk", endpoint: "/stalker/tiktok" }, { name: "GitHub Stalk", endpoint: "/stalker/github" }],
            tools: [{ name: "Short URL", endpoint: "/tools/shorturl" }, { name: "QR Code", endpoint: "/tools/qrcode" }, { name: "Weather", endpoint: "/tools/weather" }]
        };
        
        let items = endpoints[category] || [{ name: "Coming Soon", endpoint: "/coming-soon" }];
        
        return `
        <div class="stats-grid">
            ${items.map(item => `
            <div class="stat-card">
                <h3>${item.name}</h3>
                <code>${item.endpoint}</code>
                <p style="margin-top:0.5rem">Method: GET/POST</p>
                <button class="btn btn-primary" style="margin-top:1rem; width:100%">Try Now</button>
            </div>
            `).join('')}
        </div>
        `;
    }

    function attachAuthEvents() {
        document.getElementById('showLoginBtn')?.addEventListener('click', () => {
            document.getElementById('loginBox').classList.remove('hidden');
            document.getElementById('regBox').classList.add('hidden');
        });
        document.getElementById('showRegBtn')?.addEventListener('click', () => {
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('regBox').classList.remove('hidden');
        });
        document.getElementById('doLoginBtn')?.addEventListener('click', () => {
            let user = document.getElementById('loginUser').value;
            let pass = document.getElementById('loginPass').value;
            let res = login(user, pass);
            alert(res.msg);
            if (res.success) render();
        });
        document.getElementById('doRegBtn')?.addEventListener('click', () => {
            let user = document.getElementById('regUser').value;
            let email = document.getElementById('regEmail').value;
            let pass = document.getElementById('regPass').value;
            let res = register(user, pass, email);
            alert(res.msg || `Registrasi berhasil! API Key: ${res.apiKey}`);
            if (res.success) render();
        });
    }

    function attachEvents() {
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('checkApiBtn')?.addEventListener('click', () => {
            let key = document.getElementById('checkApiKey').value;
            let result = checkApiKey(key);
            document.getElementById('checkResult').innerHTML = result.valid ? 
                `<span style="color:#10b981">✅ API Key valid! Limit: ${result.data.limit}</span>` :
                `<span style="color:#ef4444">❌ ${result.msg}</span>`;
        });
    }

    // Sidebar navigation
    document.querySelectorAll('.nav-item').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            currentPage = link.dataset.page;
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            link.classList.add('active');
            render();
        });
    });

    document.getElementById('upgradeBtn')?.addEventListener('click', () => {
        currentPage = 'pricing';
        render();
    });

    render();
</script>
</body>
</html>
