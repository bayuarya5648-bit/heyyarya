<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AlightMotion Real API | Stock Produk & Payment Gateway</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://app.sandbox.midtrans.com/snap/snap.js" data-client-key="SB-Mid-client-xyz"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.5;
        }

        :root {
            --bg-body: #f0f4f8;
            --bg-card: #ffffff;
            --text-primary: #1a2a3a;
            --text-secondary: #4a627a;
            --border: #e2e8f0;
            --primary: #6c5ce7;
            --primary-dark: #5b4bc4;
            --primary-light: #e8e6fc;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --info: #3b82f6;
            --shadow: 0 10px 40px rgba(0,0,0,0.08);
        }

        body.dark {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --primary-light: #2e1a5e;
            --shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
        }

        .navbar {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .nav-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), #00b894);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.4rem;
            color: white;
        }

        .brand {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary), #00b894);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 40px;
        }

        .nav-links a:hover, .nav-links a.active {
            background: var(--primary-light);
            color: var(--primary);
        }

        .theme-toggle {
            background: var(--primary-light);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }

        .card {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 1.8rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            margin-bottom: 1.8rem;
        }

        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.8rem; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            background: var(--primary);
            color: white;
        }

        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-block { width: 100%; justify-content: center; }

        input, select, textarea {
            background: var(--bg-body);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 24px;
            width: 100%;
            font-family: inherit;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-stock { background: var(--success); color: white; }
        .badge-low { background: var(--warning); color: white; }
        .badge-out { background: var(--danger); color: white; }

        .product-card {
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.2rem;
            text-align: center;
        }

        .price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .hidden { display: none; }

        @media (max-width: 700px) {
            .container { padding: 1rem; }
            .nav-inner { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="container nav-inner">
        <div class="logo-area">
            <div class="logo-img">AM</div>
            <span class="brand">AlightMotion Real API</span>
        </div>
        <div class="nav-links">
            <a href="#" data-page="products">Produk</a>
            <a href="#" data-page="orders">Pesanan</a>
            <a href="#" data-page="profile">Profile</a>
            <a href="#" data-page="bot">Bot API</a>
            <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i> Mode</button>
        </div>
    </div>
</div>

<main class="container" id="appRoot"><div id="pageContent"></div></main>
<footer>© 2026 AlightMotion Real API | Stock Otomatis | Payment Gateway | Bot WA/Telegram</footer>

<script>
    // ==================== DATA STORAGE ====================
    let users = JSON.parse(localStorage.getItem('am_users')) || [];
    let currentUser = JSON.parse(localStorage.getItem('am_current')) || null;
    let products = JSON.parse(localStorage.getItem('am_products')) || [
        { id: 1, name: "AlightMotion Pro Lifetime", category: "Akun", price: 85000, stock: 25, image: "🎬", description: "Akun AlightMotion Pro seumur hidup" },
        { id: 2, name: "Template Premium Pack", category: "Template", price: 25000, stock: 100, image: "🎨", description: "500+ template AM terbaru" },
        { id: 3, name: "Fonts Pack Pro", category: "Fonts", price: 15000, stock: 50, image: "✍️", description: "1000+ fonts keren" },
        { id: 4, name: "Green Screen Pack", category: "Stock", price: 20000, stock: 75, image: "🎥", description: "200+ green screen video" },
        { id: 5, name: "Sound Effects Pro", category: "Audio", price: 18000, stock: 40, image: "🎵", description: "500+ SFX premium" },
        { id: 6, name: "Transition Pack", category: "Preset", price: 30000, stock: 30, image: "🔄", description: "300+ transisi keren" }
    ];
    let orders = JSON.parse(localStorage.getItem('am_orders')) || [];
    let botTokens = JSON.parse(localStorage.getItem('am_bot_tokens')) || [];
    let transactions = JSON.parse(localStorage.getItem('am_payments')) || [];

    function persist() {
        localStorage.setItem('am_users', JSON.stringify(users));
        localStorage.setItem('am_current', JSON.stringify(currentUser));
        localStorage.setItem('am_products', JSON.stringify(products));
        localStorage.setItem('am_orders', JSON.stringify(orders));
        localStorage.setItem('am_bot_tokens', JSON.stringify(botTokens));
        localStorage.setItem('am_payments', JSON.stringify(transactions));
    }

    // ==================== AUTH ====================
    function register(username, password, email) {
        if (users.find(u => u.username === username)) return { success: false, msg: "Username sudah ada" };
        users.push({ username, password: btoa(password), email, balance: 0, role: 'user', createdAt: new Date().toISOString() });
        persist();
        return { success: true };
    }

    function login(username, password) {
        let user = users.find(u => u.username === username && u.password === btoa(password));
        if (!user) return { success: false, msg: "Username/password salah" };
        currentUser = user;
        persist();
        return { success: true };
    }

    // ==================== PRODUK & STOCK OTOMATIS ====================
    function updateStock(productId, qty) {
        let product = products.find(p => p.id === productId);
        if (product && product.stock >= qty) {
            product.stock -= qty;
            persist();
            return true;
        }
        return false;
    }

    function restockProduct(productId, addStock) {
        let product = products.find(p => p.id === productId);
        if (product) {
            product.stock += addStock;
            persist();
            return true;
        }
        return false;
    }

    // ==================== ORDER & PAYMENT ====================
    function createOrder(userId, productId, quantity, paymentMethod) {
        let product = products.find(p => p.id === productId);
        if (!product) return { success: false, msg: "Produk tidak ditemukan" };
        if (product.stock < quantity) return { success: false, msg: "Stock tidak mencukupi" };
        
        const total = product.price * quantity;
        const orderId = "AM" + Date.now() + Math.floor(Math.random() * 1000);
        
        let order = {
            id: orderId,
            userId: userId,
            productId: productId,
            productName: product.name,
            quantity: quantity,
            total: total,
            paymentMethod: paymentMethod,
            status: 'pending',
            createdAt: new Date().toISOString()
        };
        orders.push(order);
        persist();
        return { success: true, orderId: orderId, total: total };
    }

    function confirmPayment(orderId, paymentProof) {
        let order = orders.find(o => o.id === orderId);
        if (!order) return { success: false, msg: "Order tidak ditemukan" };
        if (order.status !== 'pending') return { success: false, msg: "Order sudah diproses" };
        
        order.status = 'paid';
        order.paymentProof = paymentProof;
        order.paidAt = new Date().toISOString();
        
        // Kurangi stock
        let product = products.find(p => p.id === order.productId);
        if (product) {
            product.stock -= order.quantity;
        }
        
        // Tambah transaksi
        transactions.push({
            id: "TRX" + Date.now(),
            orderId: orderId,
            amount: order.total,
            status: 'completed',
            createdAt: new Date().toISOString()
        });
        
        persist();
        return { success: true, msg: "Pembayaran dikonfirmasi" };
    }

    function manualPayment(orderId) {
        let order = orders.find(o => o.id === orderId);
        if (!order) return false;
        if (order.status === 'pending') {
            order.status = 'completed';
            order.completedAt = new Date().toISOString();
            persist();
            return true;
        }
        return false;
    }

    // ==================== BOT API WEBHOOK ====================
    function generateBotToken() {
        return "AM_" + Math.random().toString(36).substring(2, 15).toUpperCase();
    }

    function registerBot(userId, botName, webhookUrl) {
        let token = generateBotToken();
        botTokens.push({ userId, botName, token, webhookUrl, createdAt: new Date().toISOString() });
        persist();
        return token;
    }

    function processWebhook(token, action, data) {
        let bot = botTokens.find(b => b.token === token);
        if (!bot) return { success: false, msg: "Invalid token" };
        
        if (action === 'check_stock') {
            let product = products.find(p => p.id == data.productId);
            return { success: true, stock: product ? product.stock : 0 };
        }
        if (action === 'order') {
            let result = createOrder(bot.userId, data.productId, data.quantity, 'bot');
            return result;
        }
        if (action === 'status') {
            let order = orders.find(o => o.id === data.orderId);
            return { success: true, status: order ? order.status : 'not_found' };
        }
        return { success: false, msg: "Unknown action" };
    }

    // ==================== RENDER ====================
    let currentPage = "products";

    function render() {
        if (!currentUser) {
            document.getElementById('pageContent').innerHTML = renderAuth();
            document.getElementById('loginBtn')?.addEventListener('click', () => {
                let res = login(document.getElementById('loginUser').value, document.getElementById('loginPass').value);
                alert(res.msg || "Login berhasil");
                if (res.success) render();
            });
            document.getElementById('regBtn')?.addEventListener('click', () => {
                let res = register(document.getElementById('regUser').value, document.getElementById('regPass').value, document.getElementById('regEmail').value);
                alert(res.msg || "Registrasi berhasil, silakan login");
                if (res.success) render();
            });
            return;
        }

        document.querySelectorAll('.nav-links a').forEach(a => {
            a.classList.remove('active');
            if(a.dataset.page === currentPage) a.classList.add('active');
        });

        let html = currentPage === 'products' ? renderProducts() :
                   currentPage === 'orders' ? renderOrders() :
                   currentPage === 'profile' ? renderProfile() : renderBotAPI();
        document.getElementById('pageContent').innerHTML = html;
        attachEvents();
    }

    function renderAuth() {
        return `
        <div class="card" style="max-width:450px; margin:2rem auto">
            <h2 style="text-align:center">AlightMotion Real API</h2>
            <div style="display:flex; gap:10px; margin:20px 0">
                <button class="btn" id="showLogin" style="flex:1">Login</button>
                <button class="btn-outline" id="showReg" style="flex:1">Register</button>
            </div>
            <div id="loginBox">
                <input type="text" id="loginUser" placeholder="Username" style="margin:10px 0">
                <input type="password" id="loginPass" placeholder="Password" style="margin:10px 0">
                <button class="btn btn-block" id="loginBtn">Login</button>
            </div>
            <div id="regBox" class="hidden">
                <input type="text" id="regUser" placeholder="Username" style="margin:10px 0">
                <input type="email" id="regEmail" placeholder="Email" style="margin:10px 0">
                <input type="password" id="regPass" placeholder="Password" style="margin:10px 0">
                <button class="btn btn-block" id="regBtn">Daftar</button>
            </div>
        </div>
        <script>
            document.getElementById('showLogin')?.onclick = () => {
                document.getElementById('loginBox').classList.remove('hidden');
                document.getElementById('regBox').classList.add('hidden');
            };
            document.getElementById('showReg')?.onclick = () => {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('regBox').classList.remove('hidden');
            };
        <\/script>`;
    }

    function renderProducts() {
        return `
        <div class="card">
            <h2><i class="fas fa-box"></i> Produk AlightMotion</h2>
            <p>Stock otomatis berkurang saat pembelian | Payment Gateway otomatis & manual</p>
        </div>
        <div class="grid-3">
            ${products.map(p => `
            <div class="product-card">
                <div style="font-size:3rem">${p.image}</div>
                <h3>${p.name}</h3>
                <p class="price">Rp ${p.price.toLocaleString()}</p>
                <p>${p.description}</p>
                <p>Stock: <span class="badge ${p.stock > 10 ? 'badge-stock' : p.stock > 0 ? 'badge-low' : 'badge-out'}">${p.stock}</span></p>
                <div style="display:flex; gap:8px; margin-top:12px">
                    <input type="number" id="qty_${p.id}" min="1" max="${p.stock}" value="1" style="width:80px">
                    <button class="btn buy-btn" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}">Beli</button>
                </div>
            </div>
            `).join('')}
        </div>
        <div class="card" id="paymentModal" class="hidden">
            <h3>Pilih Metode Pembayaran</h3>
            <button class="btn btn-success" id="payAuto">💳 Auto Payment (Midtrans/QRIS)</button>
            <button class="btn btn-outline" id="payManual">📝 Manual Transfer</button>
        </div>`;
    }

    function renderOrders() {
        let myOrders = orders.filter(o => o.userId === currentUser.username);
        return `
        <div class="card">
            <h2><i class="fas fa-shopping-cart"></i> Pesanan Saya</h2>
            ${myOrders.length === 0 ? '<p>Belum ada pesanan</p>' : `
            <table style="width:100%; border-collapse:collapse">
                <tr style="border-bottom:1px solid var(--border)">
                    <th>ID</th><th>Produk</th><th>Qty</th><th>Total</th><th>Status</th><th>Aksi</th>
                </tr>
                ${myOrders.map(o => `
                <tr style="border-bottom:1px solid var(--border)">
                    <td>${o.id}</td><td>${o.productName}</td><td>${o.quantity}</td><td>Rp ${o.total.toLocaleString()}</td>
                    <td><span class="badge ${o.status === 'completed' ? 'badge-stock' : 'badge-warning'}">${o.status}</span></td>
                    <td>${o.status === 'pending' ? `<button class="btn-outline confirm-manual" data-id="${o.id}">Konfirmasi Manual</button>` : '-'}</td>
                </tr>
                `).join('')}
            </table>
            `}
        </div>`;
    }

    function renderProfile() {
        return `
        <div class="card">
            <h2><i class="fas fa-user"></i> Profile</h2>
            <p><strong>Username:</strong> ${currentUser.username}</p>
            <p><strong>Email:</strong> ${currentUser.email || '-'}</p>
            <p><strong>Saldo:</strong> Rp ${(currentUser.balance || 0).toLocaleString()}</p>
            <button class="btn btn-danger" id="logoutBtn">Logout</button>
        </div>
        <div class="card">
            <h3>Bot API Token</h3>
            ${botTokens.filter(b => b.userId === currentUser.username).map(b => `
                <div class="badge" style="background:var(--primary); color:white; margin:5px">Token: ${b.token} | Bot: ${b.botName}</div>
            `).join('') || '<p>Belum punya token bot</p>'}
            <input type="text" id="botName" placeholder="Nama Bot"><br><br>
            <input type="text" id="webhookUrl" placeholder="Webhook URL (opsional)">
            <button class="btn" id="createBotBtn">Buat Token Bot</button>
        </div>`;
    }

    function renderBotAPI() {
        return `
        <div class="card">
            <h2><i class="fab fa-whatsapp"></i> Bot API Webhook</h2>
            <p>Konekkan bot WhatsApp/Telegram Anda ke API ini</p>
            <div class="grid-2">
                <div>
                    <h3>Endpoint API</h3>
                    <code style="background:var(--bg-body); padding:8px; display:block; border-radius:12px">POST /api/webhook</code>
                    <p style="margin-top:10px">Headers: <code>Authorization: Bearer YOUR_TOKEN</code></p>
                    <p>Body JSON: <code>{"action":"check_stock","productId":1}</code></p>
                </div>
                <div>
                    <h3>Contoh Request</h3>
                    <pre style="background:var(--bg-body); padding:12px; border-radius:12px; font-size:12px">
curl -X POST https://amapi.vercel.app/api/webhook \
  -H "Authorization: Bearer AM_XXXXX" \
  -H "Content-Type: application/json" \
  -d '{"action":"check_stock","productId":1}'
                    </pre>
                </div>
            </div>
            <hr style="margin:1rem 0">
            <h3>Test Webhook</h3>
            <input type="text" id="testToken" placeholder="Masukkan Token Bot">
            <select id="testAction">
                <option value="check_stock">Cek Stock</option>
                <option value="order">Buat Order</option>
                <option value="status">Cek Status</option>
            </select>
            <input type="text" id="testProductId" placeholder="Product ID (1-6)">
            <button class="btn" id="testWebhookBtn">Test Request</button>
            <div id="testResult" class="card" style="margin-top:1rem"></div>
        </div>`;
    }

    let selectedProduct = null;
    let selectedQty = null;

    function attachEvents() {
        document.querySelectorAll('.buy-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                let id = parseInt(btn.dataset.id);
                let qty = parseInt(document.getElementById(`qty_${id}`)?.value || 1);
                let product = products.find(p => p.id === id);
                if (!product || product.stock < qty) return alert("Stock tidak mencukupi");
                selectedProduct = product;
                selectedQty = qty;
                showPaymentOptions(product, qty);
            });
        });

        document.getElementById('payAuto')?.addEventListener('click', () => {
            if (!selectedProduct) return;
            let total = selectedProduct.price * selectedQty;
            let orderRes = createOrder(currentUser.username, selectedProduct.id, selectedQty, 'auto');
            if (orderRes.success) {
                alert(`Pesanan dibuat! ID: ${orderRes.orderId}\nTotal: Rp ${total.toLocaleString()}\nSilakan transfer ke rekening yang tersedia.`);
                // Simulasi auto payment (di real integrasi Midtrans)
                setTimeout(() => {
                    confirmPayment(orderRes.orderId, "auto_success");
                    render();
                }, 2000);
            } else alert(orderRes.msg);
        });

        document.getElementById('payManual')?.addEventListener('click', () => {
            if (!selectedProduct) return;
            let orderRes = createOrder(currentUser.username, selectedProduct.id, selectedQty, 'manual');
            if (orderRes.success) {
                alert(`Pesanan dibuat! ID: ${orderRes.orderId}\nTotal: Rp {(selectedProduct.price * selectedQty).toLocaleString()}\nTransfer ke BCA 1234567890 a.n AlightMotion\nSetelah transfer, konfirmasi di menu Pesanan`);
                render();
            } else alert(orderRes.msg);
        });

        document.querySelectorAll('.confirm-manual').forEach(btn => {
            btn.addEventListener('click', () => {
                let orderId = btn.dataset.id;
                if (manualPayment(orderId)) alert("Pesanan selesai! Produk akan dikirim.");
                else alert("Gagal");
                render();
            });
        });

        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            currentUser = null;
            persist();
            render();
        });

        document.getElementById('createBotBtn')?.addEventListener('click', () => {
            let botName = document.getElementById('botName')?.value || "MyBot";
            let webhook = document.getElementById('webhookUrl')?.value || "";
            let token = registerBot(currentUser.username, botName, webhook);
            alert(`Token Bot: ${token}\nSimpan token ini untuk koneksi bot Anda!`);
            render();
        });

        document.getElementById('testWebhookBtn')?.addEventListener('click', () => {
            let token = document.getElementById('testToken')?.value;
            let action = document.getElementById('testAction')?.value;
            let productId = parseInt(document.getElementById('testProductId')?.value);
            if (!token) return alert("Masukkan token");
            let result = processWebhook(token, action, { productId, quantity: 1 });
            document.getElementById('testResult').innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`;
        });
    }

    function showPaymentOptions(product, qty) {
        let modal = document.getElementById('paymentModal');
        if (modal) {
            modal.classList.remove('hidden');
            modal.scrollIntoView({ behavior: 'smooth' });
        }
    }

    document.querySelectorAll('.nav-links a').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            currentPage = link.dataset.page;
            render();
        });
    });

    const themeToggle = document.getElementById('themeToggle');
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    });
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');

    render();
</script>
</body>
</html>
