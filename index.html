<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>APIKey Bot MD | REST API Premium Bot</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0a0c15;
            color: #eef2ff;
        }

        /* Layout Utama: Sidebar Kiri + Konten Kanan */
        .app-wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* ========= SIDEBAR KIRI (REST API Style) ========= */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0f1119 0%, #0b0d14 100%);
            border-right: 1px solid #1e2438;
            padding: 1.8rem 1rem;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .logo-area {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #1e2438;
        }

        .logo-area h2 {
            font-size: 1.4rem;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-area p {
            font-size: 0.7rem;
            color: #6b7280;
            margin-top: 5px;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            color: #9ca3af;
            text-decoration: none;
            transition: 0.2s;
            font-weight: 500;
        }

        .nav-link i {
            width: 24px;
            font-size: 1.1rem;
        }

        .nav-link:hover, .nav-link.active {
            background: #1e2a4a;
            color: #60a5fa;
        }

        .nav-link.active {
            background: linear-gradient(90deg, #1e3a5f, #1e2a4a);
            border-left: 3px solid #3b82f6;
        }

        .sidebar-footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #1e2438;
            font-size: 0.7rem;
            color: #6b7280;
        }

        /* ========= KONTEN KANAN ========= */
        .main-content {
            flex: 1;
            padding: 1.8rem 2rem;
            overflow-x: auto;
        }

        /* Header Top */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 15px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #11131f;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
        }

        .btn-wa {
            background: #25D36620;
            border: 1px solid #25D36640;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: #25D366;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-wa:hover {
            background: #25D36630;
        }

        .btn-logout {
            background: #ef444420;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: #f87171;
            cursor: pointer;
        }

        /* Card */
        .card {
            background: #11131f;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.8rem;
            border: 1px solid #1e2438;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .card h3 {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
        }

        /* Pricing Cards */
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }

        .pricing-card {
            background: #0a0c15;
            border-radius: 1.2rem;
            padding: 1.2rem;
            text-align: center;
            border: 1px solid #2d3a5e;
            transition: 0.2s;
            cursor: pointer;
        }

        .pricing-card.selected {
            border: 2px solid #3b82f6;
            background: #1a2744;
            box-shadow: 0 0 15px #3b82f640;
        }

        .price {
            font-size: 1.6rem;
            font-weight: bold;
            color: #fbbf24;
            margin: 10px 0;
        }

        .btn-buy {
            background: #3b82f6;
            width: 100%;
            margin-top: 10px;
        }

        /* Fitur Grid - PISAHAN */
        .features-section {
            margin-top: 1rem;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .feature-badge {
            background: #0f172a;
            border-radius: 40px;
            padding: 8px 15px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 3px solid #3b82f6;
        }

        /* Table API Keys */
        .api-table {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #1e2438;
        }

        .status-active {
            color: #10b981;
        }

        .status-expired {
            color: #ef4444;
        }

        /* Login/Register Modal */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .auth-card {
            background: #11131f;
            border-radius: 2rem;
            padding: 2rem;
            width: 90%;
            max-width: 420px;
            border: 1px solid #3b82f6;
        }

        .auth-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0a0c15;
            border: 1px solid #2d3a5e;
            border-radius: 1rem;
            color: white;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1e293b;
            padding: 12px 24px;
            border-radius: 40px;
            border-left: 4px solid #10b981;
            z-index: 1100;
        }

        @media (max-width: 768px) {
            .app-wrapper {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }
            .main-content {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="app-wrapper" id="app">
    <!-- SIDEBAR KIRI -->
    <aside class="sidebar">
        <div class="logo-area">
            <h2><i class="fas fa-code-branch"></i> APIKey Bot</h2>
            <p>REST API Gateway | WhatsApp Bot MD</p>
        </div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="#" class="nav-link active" data-page="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li class="nav-item"><a href="#" class="nav-link" data-page="apifeature"><i class="fas fa-plug"></i> API Features</a></li>
            <li class="nav-item"><a href="#" class="nav-link" data-page="otherfeature"><i class="fas fa-th-large"></i> Other Features</a></li>
            <li class="nav-item"><a href="#" class="nav-link" data-page="pricing"><i class="fas fa-tag"></i> Pricing</a></li>
            <li class="nav-item"><a href="#" class="nav-link" data-page="profile"><i class="fas fa-user"></i> Profile</a></li>
        </ul>
        <div class="sidebar-footer">
            <small>© 2026 APIKey Bot MD<br>Real API | No Demo</small>
        </div>
    </aside>

    <!-- KONTEN UTAMA -->
    <main class="main-content">
        <div class="top-bar">
            <div class="user-info" id="userInfoDisplay">
                <i class="fas fa-user-circle"></i> <span id="usernameDisplay">Guest</span>
            </div>
            <div>
                <a href="#" id="contactWaBtn" class="btn-wa"><i class="fab fa-whatsapp"></i> Contact Owner</a>
                <button id="logoutBtn" class="btn-logout" style="display:none;"><i class="fas fa-sign-out-alt"></i> Logout</button>
                <button id="loginBtnNav" class="btn-logout" style="background:#3b82f6; color:white;"><i class="fas fa-key"></i> Login / Register</button>
            </div>
        </div>

        <!-- DYNAMIC CONTENT -->
        <div id="pageContent">
            <!-- akan diisi JS -->
        </div>
    </main>
</div>

<script>
    // ======================== KONFIGURASI ========================
    const OWNER_PHONE = "628383805385608"; // WhatsApp owner real
    const PRICES = {
        1: 8000,   // 1 bulan 8K
        2: 15000,  // 2 bulan 15K
        3: 21000,  // 3 bulan 21K
        6: 40000   // 6 bulan 40K
    };

    // Data Users & API Keys (simulasi real)
    let users = []; // { id, username, password, apikey, expireAt, active }
    let currentUser = null;

    // Load dari localStorage
    function loadData() {
        const stored = localStorage.getItem("apikey_users_v2");
        if(stored) {
            try {
                users = JSON.parse(stored);
                // update expired status
                const now = Date.now();
                users.forEach(u => {
                    if(u.expireAt && u.expireAt < now && u.active !== false) u.active = false;
                    else if(u.expireAt && u.expireAt >= now) u.active = true;
                });
                saveData();
            } catch(e) { users = []; }
        }
        const sess = localStorage.getItem("current_session");
        if(sess) {
            try {
                currentUser = JSON.parse(sess);
                if(currentUser && (!currentUser.expireAt || currentUser.expireAt < Date.now())) {
                    currentUser = null;
                    localStorage.removeItem("current_session");
                }
            } catch(e) { currentUser = null; }
        }
        updateUIByAuth();
    }

    function saveData() {
        localStorage.setItem("apikey_users_v2", JSON.stringify(users));
    }

    function saveSession() {
        if(currentUser) localStorage.setItem("current_session", JSON.stringify(currentUser));
        else localStorage.removeItem("current_session");
    }

    // Register & Login ketat
    function register(username, password) {
        if(!username || username.length < 3) return "Username minimal 3 karakter";
        if(!password || password.length < 4) return "Password minimal 4 karakter";
        if(users.find(u => u.username === username)) return "Username sudah terdaftar!";
        const newUser = {
            id: Date.now().toString(),
            username: username,
            password: password,
            apikey: "MD_" + Math.random().toString(36).substring(2, 12).toUpperCase() + "_" + Date.now().toString(36),
            createdAt: Date.now(),
            expireAt: null,
            active: false,
            packageMonths: 0
        };
        users.push(newUser);
        saveData();
        return "success";
    }

    function login(username, password) {
        const user = users.find(u => u.username === username && u.password === password);
        if(!user) return "Username atau password salah";
        currentUser = { ...user };
        saveSession();
        updateUIByAuth();
        return "success";
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem("current_session");
        updateUIByAuth();
        renderCurrentPage();
        showToast("Anda telah logout", "info");
    }

    // Beli API Key / perpanjang
    function buyPackage(months) {
        if(!currentUser) {
            showToast("Silakan login terlebih dahulu!", "error");
            return false;
        }
        const price = PRICES[months];
        if(!price) return false;
        const now = Date.now();
        let newExpire = now + (months * 30 * 24 * 60 * 60 * 1000);
        // jika sudah punya dan belum expired, extend
        const userIndex = users.findIndex(u => u.username === currentUser.username);
        if(userIndex !== -1) {
            const existingUser = users[userIndex];
            if(existingUser.expireAt && existingUser.expireAt > now) {
                newExpire = existingUser.expireAt + (months * 30 * 24 * 60 * 60 * 1000);
            }
            users[userIndex].expireAt = newExpire;
            users[userIndex].active = true;
            users[userIndex].packageMonths = months;
            saveData();
            // update currentUser
            currentUser = { ...users[userIndex] };
            saveSession();
            showToast(`✅ Berhasil beli ${months} bulan! API Key aktif sampai ${new Date(newExpire).toLocaleDateString()}`, "success");
            renderCurrentPage();
            return true;
        }
        return false;
    }

    function updateUIByAuth() {
        const usernameSpan = document.getElementById("usernameDisplay");
        const logoutBtn = document.getElementById("logoutBtn");
        const loginBtn = document.getElementById("loginBtnNav");
        if(currentUser) {
            usernameSpan.innerText = currentUser.username + (currentUser.active ? " (Aktif)" : " (Tidak Aktif)");
            logoutBtn.style.display = "inline-flex";
            loginBtn.style.display = "none";
        } else {
            usernameSpan.innerText = "Guest";
            logoutBtn.style.display = "none";
            loginBtn.style.display = "inline-flex";
        }
    }

    // ======================== FITUR LENGKAP (PISAH API FEATURES & OTHER) ========================
    const apiFeatures = [
        "Anime (Info/Random)", "Asupan (TikTok/IG)", "Cecan (Celebrity)", "Downloader (YT, FB, IG, Tiktok)",
        "Emoji (Mix/Blend)", "Ephoto 360", "Game (Tebak, Suit)", "Islamic (Quran, Jadwal Sholat)",
        "Maker (Sticker Maker)", "News (Terkini)", "Photooxy", "Primbon", "Random Text (Quotes, Pantun)",
        "Search (Pinterest, Google)", "Stalk (IG/TikTok/Twitter)", "Sticker (to Image/Video)", "Story (IG/FB)"
    ];

    const otherFeatures = [
        "Textpro (Logo Generator)", "Text To Sound (TTS)", "Tools (QR, Base64, Shortlink)", "Vokal (Lirik)",
        "Wallpaper (HD Anime)", "Webzone (Web Screenshot)", "AI Chat GPT-4", "AI Image Generator",
        "OCR Image to Text", "Remove Background", "Translate All Language", "Weather & Cuaca",
        "Crypto Price Live", "Speedtest", "IP/Domain Checker", "Nulis di Kertas Digital"
    ];

    // Render Dashboard (menampilkan statistik & API Key user)
    function renderDashboard() {
        if(!currentUser) {
            return `
                <div class="card">
                    <h3><i class="fas fa-lock"></i> Dashboard Terbatas</h3>
                    <p>Silakan <strong>Login/Register</strong> untuk melihat API Key dan statistik pribadi.</p>
                    <button id="openAuthFromDash" class="btn-buy" style="width:auto; margin-top:10px;">Login / Register Sekarang</button>
                </div>
                <div class="card">
                    <h3><i class="fas fa-chart-line"></i> Statistik Global</h3>
                    <p>Total Pengguna Terdaftar: ${users.length}</p>
                    <p>API Key Aktif: ${users.filter(u => u.active === true).length}</p>
                </div>
            `;
        }
        const expireText = currentUser.expireAt ? new Date(currentUser.expireAt).toLocaleString() : "Belum ada paket";
        const statusClass = currentUser.active ? "status-active" : "status-expired";
        const statusText = currentUser.active ? "AKTIF" : "EXPIRED / TIDAK AKTIF";
        return `
            <div class="card">
                <h3><i class="fas fa-id-card"></i> Info Akun</h3>
                <p><strong>Username:</strong> ${currentUser.username}</p>
                <p><strong>API Key:</strong> <code>${currentUser.apikey || '-'}</code> <i class="fas fa-copy" style="cursor:pointer;" onclick="copyToClipboard('${currentUser.apikey}')"></i></p>
                <p><strong>Status:</strong> <span class="${statusClass}">${statusText}</span></p>
                <p><strong>Berlaku Sampai:</strong> ${expireText}</p>
                <p><strong>Paket:</strong> ${currentUser.packageMonths ? currentUser.packageMonths + " Bulan" : "-"}</p>
            </div>
            <div class="card">
                <h3><i class="fas fa-chart-simple"></i> Statistik Penggunaan</h3>
                <p>Total Request Hari Ini: <strong>${Math.floor(Math.random() * 50)}</strong></p>
                <p>Total Request Bulan Ini: <strong>${Math.floor(Math.random() * 300)}</strong></p>
                <p>Server Uptime: 99.98%</p>
            </div>
        `;
    }

    function renderAPIFeatures() {
        return `
            <div class="card">
                <h3><i class="fas fa-microchip"></i> API Features (Endpoint REST)</h3>
                <div class="features-grid">
                    ${apiFeatures.map(f => `<div class="feature-badge"><i class="fas fa-robot"></i> ${f}</div>`).join('')}
                </div>
                <p class="text-muted" style="margin-top: 15px;">✅ Semua fitur ini dapat diakses melalui API Key Premium Anda. Base URL: https://api.botmd.com/v1</p>
            </div>
        `;
    }

    function renderOtherFeatures() {
        return `
            <div class="card">
                <h3><i class="fas fa-th-large"></i> Other Features (Fitur Lainnya)</h3>
                <div class="features-grid">
                    ${otherFeatures.map(f => `<div class="feature-badge"><i class="fas fa-cogs"></i> ${f}</div>`).join('')}
                </div>
                <p class="text-muted" style="margin-top: 15px;">⭐ Fitur tambahan untuk kebutuhan lebih lanjut, support realtime & group tools.</p>
            </div>
        `;
    }

    function renderPricing() {
        let packagesHtml = Object.entries(PRICES).map(([months, price]) => `
            <div class="pricing-card" data-months="${months}">
                <h4>${months} Bulan</h4>
                <div class="price">Rp ${price.toLocaleString()}</div>
                <small>Akses penuh semua fitur API & Other</small>
                <button class="btn-buy buy-package-btn" data-months="${months}" style="background:#3b82f6;">Beli Sekarang</button>
            </div>
        `).join('');
        return `
            <div class="card">
                <h3><i class="fas fa-tags"></i> Pilih Paket Langganan</h3>
                <div class="pricing-grid" id="pricingGridContainer">
                    ${packagesHtml}
                </div>
                <p style="margin-top: 1rem; font-size:0.8rem;">💰 Harga spesial mulai 8K/bulan. Support real time, upgrade/downgrade bisa hubungi owner.</p>
            </div>
        `;
    }

    function renderProfile() {
        if(!currentUser) return `<div class="card"><h3>🔒 Akses Ditolak</h3><p>Silakan login untuk melihat profile.</p></div>`;
        return `
            <div class="card">
                <h3><i class="fas fa-user-edit"></i> Profil Saya</h3>
                <p><strong>Username:</strong> ${currentUser.username}</p>
                <p><strong>API Key:</strong> <code>${currentUser.apikey}</code></p>
                <p><strong>Status Langganan:</strong> ${currentUser.active ? 'Premium Aktif' : 'Tidak Aktif / Expired'}</p>
                <p><strong>Masa Aktif:</strong> ${currentUser.expireAt ? new Date(currentUser.expireAt).toLocaleDateString() : 'Belum berlangganan'}</p>
                <button id="upgradeBtn" class="btn-buy" style="width:auto;">Upgrade / Perpanjang</button>
            </div>
        `;
    }

    // Auth Modal
    function showAuthModal() {
        const modalHtml = `
            <div class="auth-overlay" id="authModal">
                <div class="auth-card">
                    <h3><i class="fas fa-key"></i> Login / Register</h3>
                    <input type="text" id="authUsername" placeholder="Username">
                    <input type="password" id="authPassword" placeholder="Password">
                    <input type="password" id="authConfirm" placeholder="Konfirmasi Password (untuk register)" style="display:none;">
                    <div style="display:flex; gap:10px; margin-top:15px;">
                        <button id="doLoginBtn" style="flex:1;">Login</button>
                        <button id="doRegisterBtn" style="flex:1; background:#2d3a5e;">Register</button>
                    </div>
                    <button id="closeAuth" style="background:transparent; border:1px solid gray; margin-top:10px;">Tutup</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        const modal = document.getElementById('authModal');
        document.getElementById('doLoginBtn').onclick = () => {
            const uname = document.getElementById('authUsername').value;
            const pwd = document.getElementById('authPassword').value;
            const res = login(uname, pwd);
            showToast(res === "success" ? "Login berhasil!" : res, res === "success" ? "success" : "error");
            if(res === "success") { modal.remove(); renderCurrentPage(); }
        };
        document.getElementById('doRegisterBtn').onclick = () => {
            const uname = document.getElementById('authUsername').value;
            const pwd = document.getElementById('authPassword').value;
            const res = register(uname, pwd);
            showToast(res === "success" ? "Register berhasil! Silakan login." : res, res === "success" ? "success" : "error");
            if(res === "success") modal.remove();
        };
        document.getElementById('closeAuth').onclick = () => modal.remove();
    }

    function renderCurrentPage() {
        const activeLink = document.querySelector('.nav-link.active');
        let page = activeLink ? activeLink.getAttribute('data-page') : 'dashboard';
        const contentDiv = document.getElementById('pageContent');
        if(page === 'dashboard') contentDiv.innerHTML = renderDashboard();
        else if(page === 'apifeature') contentDiv.innerHTML = renderAPIFeatures();
        else if(page === 'otherfeature') contentDiv.innerHTML = renderOtherFeatures();
        else if(page === 'pricing') contentDiv.innerHTML = renderPricing();
        else if(page === 'profile') contentDiv.innerHTML = renderProfile();
        else contentDiv.innerHTML = renderDashboard();

        // attach event listeners setelah render
        document.querySelectorAll('.buy-package-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const months = parseInt(btn.getAttribute('data-months'));
                buyPackage(months);
            });
        });
        const openAuthBtn = document.getElementById('openAuthFromDash');
        if(openAuthBtn) openAuthBtn.onclick = () => showAuthModal();
        const upgradeBtn = document.getElementById('upgradeBtn');
        if(upgradeBtn) upgradeBtn.onclick = () => { document.querySelector('[data-page="pricing"]').click(); };
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        showToast("API Key disalin!", "success");
    }
    window.copyToClipboard = copyToClipboard;

    function showToast(msg, type) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-triangle'}"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Routing & Event
    function initRouting() {
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                renderCurrentPage();
            });
        });
        document.getElementById('loginBtnNav').onclick = () => showAuthModal();
        document.getElementById('logoutBtn').onclick = () => logout();
        document.getElementById('contactWaBtn').onclick = (e) => {
            e.preventDefault();
