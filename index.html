<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arya Payment Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  font-family: 'Poppins', sans-serif;
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at top, #0f172a, #020617);
  overflow: hidden;
}

/* LOADING SCREEN */
#loader {
  position: fixed;
  inset: 0;
  background: #020617;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.loader-circle {
  width: 70px;
  height: 70px;
  border: 5px solid #1e293b;
  border-top: 5px solid #2563eb;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* BACKGROUND ANIMATION */
.bg-anim {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(270deg, #2563eb, #7c3aed, #22d3ee);
  opacity: 0.07;
  animation: bgmove 8s infinite alternate;
}

@keyframes bgmove {
  from { filter: blur(60px); }
  to { filter: blur(120px); }
}

/* CONTAINER */
.container {
  position: relative;
  z-index: 2;
  width: 380px;
  background: rgba(2,6,23,0.92);
  border-radius: 18px;
  padding: 20px;
  margin: auto;
  margin-top: 50px;
  box-shadow: 0 0 30px rgba(0,0,0,0.9);
  border: 1px solid #1e293b;
}

/* LOGO */
.logo {
  display: flex;
  justify-content: center;
}

.logo img {
  width: 90px;
  border-radius: 50%;
  box-shadow: 0 0 20px #2563eb;
}

/* TITLE */
h2 {
  text-align: center;
  margin: 10px 0 15px;
}

/* CARD */
.card {
  background: #020617;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
  border: 1px solid #1e293b;
}

/* GLOW BUTTON */
.glow-btn {
  width: 100%;
  margin-top: 8px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #020617;
  color: white;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.glow-btn::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  background: linear-gradient(45deg, #2563eb, #7c3aed, #22d3ee);
  animation: rotate 4s linear infinite;
  opacity: 0.7;
}

.glow-btn span {
  position: relative;
  z-index: 2;
}

.glow-btn::after {
  content: "";
  position: absolute;
  inset: 2px;
  background: #020617;
  border-radius: 10px;
}

@keyframes rotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* QRIS */
.qris img {
  width: 100%;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid #1e293b;
}

/* SPOTIFY */
.spotify {
  margin-top: 15px;
}

/* FOOTER */
.footer {
  text-align: center;
  font-size: 12px;
  opacity: 0.6;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loader">
  <div class="loader-circle"></div>
</div>

<!-- BACKGROUND -->
<div class="bg-anim"></div>

<!-- SOUND EFFECT -->
<audio id="clickSound">
  <source src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3">
</audio>

<!-- CONTAINER -->
<div class="container">

  <!-- LOGO -->
  <div class="logo">
    <img src="https://files.catbox.moe/dpi561.jpeg">
  </div>

  <h2>ARYA PAYMENT</h2>

  <!-- PAYMENT -->
  <div class="card">
    <b>DANA</b><br>
    083851270439
    <button class="glow-btn" onclick="copyText('083851270439')">
      <span>Copy Dana</span>
    </button>
  </div>

  <div class="card">
    <b>OVO</b><br>
    083805385608
    <button class="glow-btn" onclick="copyText('083805385608')">
      <span>Copy OVO</span>
    </button>
  </div>

  <div class="card">
    <b>GOPAY</b><br>
    083805385608
    <button class="glow-btn" onclick="copyText('083805385608')">
      <span>Copy Gopay</span>
    </button>
  </div>

  <!-- QRIS -->
  <div class="card qris">
    <b>QRIS PAYMENT</b>
    <img src="https://files.catbox.moe/z6fk9n.jpeg">
  </div>

  <!-- ORDER WHATSAPP -->
  <div class="card">
    <button class="glow-btn" onclick="orderWA()">
      <span>ORDER VIA WHATSAPP</span>
    </button>
  </div>

  <!-- SPOTIFY -->
  <div class="spotify">
    <iframe style="border-radius:12px"
      src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M"
      width="100%" height="80"
      frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </div>

  <div class="footer">
    © 2026 Arya Payment Store
  </div>

</div>

<script>
const sound = document.getElementById("clickSound");

// LOADING
window.onload = () => {
  setTimeout(() => {
    document.getElementById("loader").style.display = "none";
    document.body.style.overflow = "auto";
  }, 1500);
}

// COPY FUNCTION
function copyText(text) {
  sound.play();
  navigator.clipboard.writeText(text);
  alert("Berhasil disalin: " + text);
}

// WHATSAPP ORDER
function orderWA() {
  sound.play();
  const number = "6283805385608";
  const message = encodeURIComponent("Halo Admin, saya mau order payment.");
  window.open(`https://wa.me/${number}?text=${message}`, "_blank");
}
</script>

</body>
</html>
