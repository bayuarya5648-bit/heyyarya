            { feature: "Maker Tools", date: "2026-04-28 09:12:33", notes: "Tambah watermark & sticker wm", previewLink: "#" },
            { feature: "Downloader", date: "2026-04-20 18:45:12", notes: "Support youtube playlist", previewLink: "#" }
        ];

        // Fungsi untuk render UI halaman
        function renderDashboard() {
            let content = `
                <div class="space-y-6">
                    <!-- STATS GRID -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
                        <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 stat-card">
                            <div class="flex items-center justify-between">
                                <div><p class="text-gray-500 text-sm">YOUR IP ADDRESS</p><h3 class="text-2xl font-bold mt-1">${stats.ip}</h3></div>
                                <i class="fas fa-network-wired text-3xl text-blue-400 opacity-70"></i>
                            </div>
                        </div>
                        <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 stat-card">
                            <div class="flex items-center justify-between">

                            </div>

                        <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 stat-card">
                            <div class="flex items-center justify-between">
                                <div><p class="text-gray-500 text-sm">REQUEST TODAY</p><h3 class="text-2xl font-bold mt-1">${stats.requestToday.toLocaleString()}</h3></div>

                        </div>
                        <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 stat-card">

                    <!-- API KEY SECTION -->

                            <div class="flex gap-2 w-full md:w-auto"><input type="text" id="apiKeyInput" class="flex-1 border border-gray-300 rounded-xl px-4 py-2 focus:ring-2 focus:ring-blue-400" placeholder="Enter your API key..." value="${currentApiKey}">
                            <button id="checkApiKeyBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl transition"><i class="fas fa-check-circle"></i> Check</button></div>
                        </div>
                        <div class="mt-5 bg-gray-50 rounded-xl p-4 border border-gray-200">
                            <p class="text-sm text-gray-600"><i class="fas fa-info-circle text-blue-500"></i> <strong>Welcome to Autoresbot API!!</strong> Thank you for using the services of Autoresbot API!! Please use an API key that is hard to guess, just like a strong password.</p>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">

                                <div><span class="text-xs text-gray-500">Limit</span><p class="font-semibold">${apiLimit}</p></div>

                    </div>
                    
                    <!-- FEATURE UPDATES TABLE -->

            document.getElementById("dynamicContent").innerHTML = content;
            attachDashboardEvents();
        }
        
        function attachDashboardEvents() {
            document.getElementById("checkApiKeyBtn")?.addEventListener("click", () => {
                let newKey = document.getElementById("apiKeyInput").value;
                if(newKey.trim()) {
                    currentApiKey = newKey;
                    localStorage.setItem("autoresbot_api_key", newKey);
                    alert(`✅ API Key updated: ${newKey}\nLimit: ${apiLimit}\nStatus: Active`);
                    renderDashboard(); // refresh
                } else alert("Masukkan API key yang valid!");
            });
            document.getElementById("testApiBtn")?.addEventListener("click", async () => {
                let endpoint = document.getElementById("demoEndpoint").value;
                let pre = document.getElementById("apiResponseDemo");
                pre.innerText = "⏳ Memproses request... (simulasi multi device API)";
                setTimeout(() => {
                    let mockResponses = {
                        "/api/islami/jadwal-sholat": { status: "success", city: "Jakarta", jadwal: { subuh: "04:30", dzuhur: "12:00", ashar: "15:30", maghrib: "18:00", isya: "19:20" } },
                        "/api/maker/sticker": { status: "success", url_sticker: "https://example.com/sticker.webp", message: "Sticker berhasil dibuat (Multi Device)" },
                        "/api/downloader/ytmp3": { status: "success", title: "Sample Song", download_url: "https://dl.example.com/audio.mp3" },
                        "/api/ai/chatgpt": { status: "success", response: "Halo! Saya asisten AI dari Autoresbot, gunakan API key untuk akses penuh." }
                    };
                    let response = mockResponses[endpoint] || { status: "success", message: "Endpoint siap digunakan, silakan integrasikan dengan API key", docs: "https://docs.autoresbot.com" };
                    pre.innerText = JSON.stringify({ ...response, timestamp: new Date().toISOString(), api_key_used: currentApiKey.slice(0,8)+"..." }, null, 2);
                }, 600);
            });
        }
        
        // Halaman Pricing
        function renderPricing() {
            document.getElementById("dynamicContent").innerHTML = `
                <div class="max-w-5xl mx-auto">
                    <div class="text-center mb-10"><h2 class="text-3xl font-black">Pilih Paket Sesuai Kebutuhan</h2><p class="text-gray-500">Akses penuh ke 18+ kategori API & support multi device</p></div>
                    <div class="grid md:grid-cols-3 gap-6">
                        <div class="bg-white rounded-2xl p-6 shadow-lg border"><div class="text-center"><i class="fas fa-seedling text-3xl text-green-500"></i><h3 class="text-xl font-bold mt-2">Free</h3><p class="text-3xl font-bold mt-2">Rp0<span class="text-sm">/bulan</span></p><hr class="my-4"/><ul class="space-y-2 text-sm"><li><i class="fas fa-check-circle text-green-500"></i> 1,000 request/hari</li><li><i class="fas fa-check-circle text-green-500"></i> 10 endpoint dasar</li><li>Support komunitas</li></ul><button class="mt-6 w-full bg-gray-200 py-2 rounded-xl">Aktifkan</button></div></div>
                        <div class="bg-gradient-to-br from-indigo-50 to-purple-50 rounded-2xl p-6 shadow-xl border-2 border-indigo-300 relative"><div class="absolute -top-3 right-4 bg-indigo-600 text-white px-3 py-1 rounded-full text-xs">POPULER</div><div class="text-center"><i class="fas fa-rocket text-4xl text-indigo-600"></i><h3 class="text-xl font-bold mt-2">Pro</h3><p class="text-3xl font-bold">Rp99k<span class="text-sm">/bulan</span></p><hr class="my-4"/><ul class="space-y-2 text-sm"><li><i class="fas fa-check-circle text-indigo-500"></i> 50,000 request/hari</li><li><i class="fas fa-check-circle text-indigo-500"></i> Semua endpoint (50+)</li><li><i class="fas fa-check-circle text-indigo-500"></i> Priority support + Multi Device</li></ul><button class="mt-6 w-full bg-indigo-600 text-white py-2 rounded-xl hover:bg-indigo-700">Upgrade Now</button></div></div>
                        <div class="bg-white rounded-2xl p-6 shadow-lg"><div class="text-center"><i class="fas fa-crown text-3xl text-yellow-500"></i><h3 class="text-xl font-bold mt-2">Enterprise</h3><p class="text-3xl font-bold">Custom</p><hr class="my-4"/><ul class="space-y-2 text-sm"><li><i class="fas fa-check-circle text-yellow-500"></i> Unlimited request</li><li><i class="fas fa-check-circle text-yellow-500"></i> Dedicated Server</li><li>SLA 99.9%</li></ul><button class="mt-6 w-full bg-gray-200 py-2 rounded-xl">Hubungi Sales</button></div></div>
                    </div>
                </div>
            `;
        }
        
        // Documentation Halaman lengkap
        function renderDocumentation() {
            let catsHtml = apiCategories.map(cat => `<div class="border-b pb-2 mb-3"><div class="flex items-center gap-2"><i class="fas ${cat.icon} text-blue-600"></i><h3 class="font-bold text-lg">${cat.name}</h3></div><div class="ml-6 space-x-2 text-sm"><code class="bg-gray-100 px-2 py-1 rounded">${cat.endpoints.join('</code> <code class="bg-gray-100 px-2 py-1 rounded">')}</code></div></div>`).join('');
            document.getElementById("dynamicContent").innerHTML = `
                <div class="max-w-6xl mx-auto">
                    <div class="bg-white rounded-2xl p-6 shadow-sm mb-6"><h1 class="text-2xl font-bold">📘 Dokumentasi API Lengkap</h1><p class="text-gray-500">Autentikasi menggunakan header <code class="bg-gray-200 px-1">X-API-Key: YOUR_KEY</code> atau query <code>?api_key=...</code>. Base URL: <code>https://api.autoresbot.com/v1</code></p></div>
                    <div class="bg-white rounded-2xl p-6 shadow-sm mb-6"><h2 class="text-xl font-bold mb-3"><i class="fas fa-key"></i> Cara Penggunaan</h2><pre>curl -X GET "https://api.autoresbot.com/v1/islami/jadwal-sholat?kota=Jakarta" -H "X-API-Key: ${currentApiKey}"</pre><pre># Response contoh: { "status": "success", "data": {...} }</pre></div>
                    <div class="bg-white rounded-2xl p-6 shadow-sm"><h2 class="text-xl font-bold mb-4">📂 Kategori Endpoint (Multi Device Ready)</h2>${catsHtml}<div class="mt-5 p-3 bg-blue-50 rounded-xl"><i class="fas fa-globe"></i> Semua endpoint mendukung WhatsApp Bot & Multi Device Integration secara realtime.</div></div>
                </div>
            `;
        }
        
        // Sidebar Navigation & Categories Rendering
        function buildSidebarCategories() {
            const container = document.getElementById("categoriesList");
            if(container) {
                container.innerHTML = apiCategories.map(cat => `
                    <a href="#" class="category-item flex items-center gap-3 px-3 py-2 rounded-xl text-gray-300 hover:bg-white/10 transition-all text-sm" data-category="${cat.name}">
                        <i class="fas ${cat.icon} w-5"></i> <span>${cat.name}</span>
                    </a>
                `).join('');
                // event listener untuk kategori (sebagai demo redirect ke doc)
                document.querySelectorAll('.category-item').forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.preventDefault();
                        let catName = el.getAttribute('data-category');
                        renderDocumentation();
                        setTimeout(() => {
                            document.getElementById("pageTitle").innerText = `Documentation: ${catName}`;
                        }, 50);
                        setActiveNav(null);
                    });
                });
            }
        }
        
        function setActiveNav(activeId) {
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('bg-white/20', 'text-white'));
            if(activeId) {
                let activeLink = document.querySelector(`.nav-link[data-page="${activeId}"]`);
                if(activeLink) activeLink.classList.add('bg-white/20', 'text-white');
            }
        }
        
        function loadPage(page) {
            if(page === 'dashboard') { renderDashboard(); document.getElementById("pageTitle").innerHTML = "Dashboard"; setActiveNav('dashboard'); }
            else if(page === 'pricing') { renderPricing(); document.getElementById("pageTitle").innerHTML = "Pricing"; setActiveNav('pricing'); }
            else if(page === 'documentation') { renderDocumentation(); document.getElementById("pageTitle").innerHTML = "Documentation"; setActiveNav('documentation'); }
        }
        
        // event listeners untuk sidebar link
        function bindNavEvents() {
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    let page = link.getAttribute('data-page');
                    if(page) loadPage(page);
                });
            });
        }
        
        // Inisialisasi & Update user greeting
        function init() {
